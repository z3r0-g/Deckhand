<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deckhand</title>

    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='deckhand.css') }}?v={{ cache_bust }}">
</head>
<body>

<!-- TOP TOOLBAR -->
<div class="toolbar">
    <button id="filter-toggle">Show: All</button>
    <button id="update-all">Update All</button>
    <button id="refresh-status">Refresh</button>
    <button id="scheduler-settings">Scheduler</button>
</div>

<!-- LOADING OVERLAY -->
<div id="loading-overlay" class="loading hidden">
    <div id="loading-text">Loading…</div>
</div>

<!-- MAIN CONTAINER -->
<div class="container" id="deckhand"></div>

<!-- BOTTOM TOOLBAR -->
<div class="bottom-toolbar">
    <button id="search-btn">Search</button>
    <input type="text" id="search-input" class="hidden" placeholder="Search containers...">
    <div id="summary-stats"></div>
</div>

<!-- SCHEDULER MODAL -->
<div id="scheduler-modal" class="modal hidden">
    <div class="modal-content">
        <div class="modal-header">
            <span>Scheduler Settings</span>
            <button id="sched-close">X</button>
        </div>
        <div class="modal-body">
            <label class="sched-row">
                <input type="checkbox" id="sched-enabled">
                Enable Scheduler
            </label>

            <label class="sched-row">
                Interval (minutes):
                <input type="number" id="sched-interval" min="1">
            </label>

            <button id="sched-save" class="primary">Save</button>
        </div>
    </div>
</div>

<!-- EVENTS & HISTORY MODAL -->
<div id="event-modal" class="modal hidden">
    <div class="modal-content">
        <div class="modal-header">
            <span id="event-title"></span>
            <button id="close-event">X</button>
        </div>
        <div id="event-body"></div>
    </div>
</div>

<!-- FULL-SCREEN MAP MODAL -->
<div id="map-modal" class="modal hidden">
    <div class="modal-content">
        <div class="modal-header">
            <span id="map-title"></span>
            <button id="map-close">✕</button>
        </div>
        <div id="map-body">
            <!-- Future network graph will render here -->
        </div>
    </div>
</div>

<script>
    window.deckhandUiMode = "{{ ui_mode }}";
</script>

<script src="{{ url_for('static', filename='deckhand.js') }}?v={{ cache_bust }}"></script>

</body>
</html>
