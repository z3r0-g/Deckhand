name: Publish Docker Image

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  APP_VERSION: 0.0.4 #Phase 4

permissions:
  contents: read
  packages: write

jobs:
  PREP:
    runs-on: ubuntu-latest
    outputs:
      image_name: ${{ steps.lowercase.outputs.image_name }}
    steps:
      - id: lowercase
        run: echo "image_name=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

  BUILD_AND_PUSH:
    needs: PREP
    runs-on: ubuntu-latest
    steps:
      # FULL, CLEAN CHECKOUT (no shallow clone, no cache)
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true
          lfs: true

      # Login to GHCR
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Metadata
      - name: Extract Metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ needs.PREP.outputs.image_name }}
          tags: |
            type=raw,value=v${{ env.APP_VERSION }},enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=short,prefix=${{ env.APP_VERSION }}-sha-
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
          flavor: |
            latest=true

      # FULL NO‑CACHE BUILD (forces rebuild of every layer with fresh repo files)
      - name: Create & Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_ID=${{ github.run_id }}-${{ github.run_number }}-${{ github.sha }}
            APP_VERSION=${{ env.APP_VERSION }}.${{ github.run_number }}
          pull: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false
