# .github/workflows/docker-publish.yml
name: Publish Docker Image

on:
  push:
    branches: ['main']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  PREP:
    runs-on: ubuntu-latest
    outputs:
      image_name: ${{ steps.lowercase.outputs.image_name }}
    steps:
      - id: lowercase
        run: echo "image_name=${GITHUB_REPOSITORY@L}" >> $GITHUB_OUTPUT

  BUILD:
    needs: PREP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Build Action
        uses: docker/setup-buildx-action@v3
  
  PUSH:
    needs: BUILD
    runs-on: ubuntu-latest
    steps:
      #Login to Container Registry
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      #FORCE TAG OVERWRITE
      - name: Extract Metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ needs.PREP.outputs.image_name }}
          tags: |
            latest
            type=raw,value=0.1.${{ github.run_number }}
            type=sha
          flavor: |
            latest=true
          force: true
      #Create & Push Docker Image
      - name: Create & Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache: true
          provenance: false
          sbom: false
