# .github/workflows/docker-publish.yml
name: Publish Docker Image

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  PREP:
    runs-on: ubuntu-latest
    outputs:
      image_name: ${{ steps.lowercase.outputs.image_name }}
    steps:
      - id: lowercase
        run: echo "image_name=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

  BUILD_AND_PUSH:
    needs: PREP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Login to Container Registry
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Build Action
        uses: docker/setup-buildx-action@v3

      # Extract Metadata (tags, labels)
      - name: Extract Metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ needs.PREP.outputs.image_name }}
          tags: |
            type=ref,event=branch                     # Tags 'main'
            type=ref,event=pr                         # Tags 'pr-5'
            type=semver,pattern={{version}}           # Tags '1.0.0' (on git tag)
            type=semver,pattern={{major}}.{{minor}}   # Tags '1.0' (on git tag)
            type=sha,format=short,prefix=             # Tags 'a1b2c3d' (short commit sha)
          flavor: |
            latest=true

      # Create & Push Docker Image (Multi-Arch)
      - name: Create & Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache: true
          provenance: false
          sbom: false
